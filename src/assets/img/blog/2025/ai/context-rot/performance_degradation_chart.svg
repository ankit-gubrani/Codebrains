<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">
    LLM Performance vs Context Length
  </text>
  <text x="500" y="70" font-family="Arial, sans-serif" font-size="16" fill="#666666" text-anchor="middle">
    All models show degradation as context increases (Chroma AI Research)
  </text>
  
  <!-- Chart area -->
  <g transform="translate(100, 120)">
    <!-- Axes -->
    <line x1="0" y1="400" x2="800" y2="400" stroke="#333333" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="400" stroke="#333333" stroke-width="2"/>
    
    <!-- Y-axis labels -->
    <text x="-15" y="10" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">100%</text>
    <text x="-15" y="110" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">90%</text>
    <text x="-15" y="210" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">80%</text>
    <text x="-15" y="310" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">70%</text>
    <text x="-15" y="410" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">60%</text>
    
    <!-- Y-axis title -->
    <text x="-60" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle" transform="rotate(-90, -60, 200)">
      Accuracy (%)
    </text>
    
    <!-- X-axis labels -->
    <text x="0" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">1K</text>
    <text x="160" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">10K</text>
    <text x="320" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">25K</text>
    <text x="480" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">50K</text>
    <text x="640" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">75K</text>
    <text x="800" y="430" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">100K</text>
    
    <!-- X-axis title -->
    <text x="400" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">
      Context Length (tokens)
    </text>
    
    <!-- Grid lines -->
    <line x1="0" y1="100" x2="800" y2="100" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- Performance curves for different models -->
    
    <!-- GPT-4 -->
    <path d="M 0,40 Q 160,50 320,80 T 640,180 800,260" 
          stroke="#f44336" stroke-width="3" fill="none"/>
    <circle cx="0" cy="40" r="5" fill="#f44336"/>
    <circle cx="160" cy="60" r="5" fill="#f44336"/>
    <circle cx="320" cy="90" r="5" fill="#f44336"/>
    <circle cx="480" cy="140" r="5" fill="#f44336"/>
    <circle cx="640" cy="200" r="5" fill="#f44336"/>
    <circle cx="800" cy="260" r="5" fill="#f44336"/>
    
    <!-- Claude -->
    <path d="M 0,20 Q 160,35 320,60 T 640,140 800,210" 
          stroke="#2196f3" stroke-width="3" fill="none"/>
    <circle cx="0" cy="20" r="5" fill="#2196f3"/>
    <circle cx="160" cy="40" r="5" fill="#2196f3"/>
    <circle cx="320" cy="65" r="5" fill="#2196f3"/>
    <circle cx="480" cy="105" r="5" fill="#2196f3"/>
    <circle cx="640" cy="160" r="5" fill="#2196f3"/>
    <circle cx="800" cy="210" r="5" fill="#2196f3"/>
    
    <!-- Gemini -->
    <path d="M 0,30 Q 160,45 320,75 T 640,170 800,250" 
          stroke="#4caf50" stroke-width="3" fill="none"/>
    <circle cx="0" cy="30" r="5" fill="#4caf50"/>
    <circle cx="160" cy="50" r="5" fill="#4caf50"/>
    <circle cx="320" cy="80" r="5" fill="#4caf50"/>
    <circle cx="480" cy="130" r="5" fill="#4caf50"/>
    <circle cx="640" cy="190" r="5" fill="#4caf50"/>
    <circle cx="800" cy="250" r="5" fill="#4caf50"/>
    
    <!-- Ideal (flat line) -->
    <line x1="0" y1="20" x2="800" y2="20" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="10,5"/>
    
    <!-- Legend -->
    <g transform="translate(600, 30)">
      <rect x="0" y="0" width="180" height="140" fill="#f9f9f9" stroke="#cccccc" stroke-width="1" rx="5"/>
      
      <line x1="15" y1="25" x2="45" y2="25" stroke="#2196f3" stroke-width="3"/>
      <text x="55" y="30" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a">Claude Opus 4</text>
      
      <line x1="15" y1="50" x2="45" y2="50" stroke="#4caf50" stroke-width="3"/>
      <text x="55" y="55" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a">Gemini 2.5 Pro</text>
      
      <line x1="15" y1="75" x2="45" y2="75" stroke="#f44336" stroke-width="3"/>
      <text x="55" y="80" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a">GPT-4.1</text>
      
      <line x1="15" y1="105" x2="45" y2="105" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="55" y="110" font-family="Arial, sans-serif" font-size="13" fill="#666666">Ideal (no decay)</text>
    </g>
    
    <!-- Annotation arrows and text -->
    
    <!-- Early context - good performance -->
    <rect x="50" y="250" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
    <text x="125" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">
      Sweet Spot
    </text>
    <text x="125" y="290" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
      1K-10K tokens:
    </text>
    <text x="125" y="305" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
      Minimal degradation
    </text>
    
    <!-- Long context - performance drops -->
    <rect x="550" y="320" width="180" height="60" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="640" y="342" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">
      Context Rot Zone
    </text>
    <text x="640" y="360" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
      50K+ tokens:
    </text>
    <text x="640" y="375" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
      Severe degradation
    </text>
  </g>
</svg>