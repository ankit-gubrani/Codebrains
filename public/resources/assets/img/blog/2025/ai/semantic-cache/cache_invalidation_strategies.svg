<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-ttl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-version" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-confidence" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="550" fill="#f7fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2d3748" text-anchor="middle">
    Cache Invalidation Strategies
  </text>
  <text x="400" y="58" font-family="Arial, sans-serif" font-size="13" fill="#718096" text-anchor="middle" font-style="italic">
    Keeping your semantic cache fresh and accurate
  </text>
  
  <!-- Strategy 1: Time-Based (TTL) -->
  <g id="ttl-strategy">
    <rect x="30" y="90" width="230" height="200" rx="10" fill="#fff" stroke="#667eea" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Header -->
    <rect x="30" y="90" width="230" height="45" rx="10" fill="url(#grad-ttl)"/>
    <text x="145" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
      ⏱️ Time-Based (TTL)
    </text>
    
    <!-- Content -->
    <text x="145" y="160" font-family="Arial, sans-serif" font-size="13" fill="#2d3748" text-anchor="middle" font-weight="600">
      Expires after fixed time
    </text>
    
    <!-- Timeline visualization -->
    <line x1="50" y1="185" x2="240" y2="185" stroke="#cbd5e0" stroke-width="2"/>
    <circle cx="50" cy="185" r="5" fill="#48bb78"/>
    <text x="50" y="205" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">
      Cached
    </text>
    
    <circle cx="145" cy="185" r="5" fill="#f6ad55"/>
    <text x="145" y="205" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">
      12 hours
    </text>
    
    <circle cx="240" cy="185" r="5" fill="#e53e3e"/>
    <text x="240" y="205" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">
      Expired
    </text>
    
    <!-- Guidelines -->
    <rect x="45" y="220" width="190" height="60" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
    <text x="50" y="237" font-family="Arial, sans-serif" font-size="11" fill="#2d3748" font-weight="600">
      TTL Guidelines:
    </text>
    <text x="55" y="252" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">
      • Policies: 7-30 days
    </text>
    <text x="55" y="265" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">
      • Product docs: 24-72 hrs
    </text>
    <text x="55" y="278" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">
      • Promotions: 30-60 min
    </text>
  </g>
  
  <!-- Strategy 2: Version-Based -->
  <g id="version-strategy">
    <rect x="285" y="90" width="230" height="200" rx="10" fill="#fff" stroke="#48bb78" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Header -->
    <rect x="285" y="90" width="230" height="45" rx="10" fill="url(#grad-version)"/>
    <text x="400" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
      🔄 Version-Based
    </text>
    
    <!-- Content -->
    <text x="400" y="160" font-family="Arial, sans-serif" font-size="13" fill="#2d3748" text-anchor="middle" font-weight="600">
      Tracks source versions
    </text>
    
    <!-- Version flow -->
    <rect x="300" y="175" width="80" height="35" rx="6" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
    <text x="340" y="193" font-family="Arial, sans-serif" font-size="11" fill="#22543d" text-anchor="middle" font-weight="bold">
      Doc v1.2
    </text>
    <text x="340" y="205" font-family="Arial, sans-serif" font-size="9" fill="#2d7748" text-anchor="middle">
      Cached
    </text>
    
    <path d="M 380 193 L 410 193" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="410" y="175" width="90" height="35" rx="6" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
    <text x="455" y="193" font-family="Arial, sans-serif" font-size="11" fill="#c53030" text-anchor="middle" font-weight="bold">
      Doc v1.3
    </text>
    <text x="455" y="205" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c" text-anchor="middle">
      Invalidate!
    </text>
    
    <!-- Process -->
    <rect x="300" y="225" width="190" height="55" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1"/>
    <text x="305" y="242" font-family="Arial, sans-serif" font-size="11" fill="#22543d" font-weight="600">
      On document change:
    </text>
    <text x="310" y="257" font-family="Arial, sans-serif" font-size="10" fill="#2d7748">
      1. Increment version
    </text>
    <text x="310" y="270" font-family="Arial, sans-serif" font-size="10" fill="#2d7748">
      2. Invalidate all cache refs
    </text>
  </g>
  
  <!-- Strategy 3: Confidence-Based -->
  <g id="confidence-strategy">
    <rect x="540" y="90" width="230" height="200" rx="10" fill="#fff" stroke="#ed8936" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Header -->
    <rect x="540" y="90" width="230" height="45" rx="10" fill="url(#grad-confidence)"/>
    <text x="655" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
      🎯 Confidence-Based
    </text>
    
    <!-- Content -->
    <text x="655" y="160" font-family="Arial, sans-serif" font-size="13" fill="#2d3748" text-anchor="middle" font-weight="600">
      Background revalidation
    </text>
    
    <!-- Confidence meter -->
    <rect x="560" y="175" width="180" height="25" rx="6" fill="#e2e8f0"/>
    <rect x="560" y="175" width="135" height="25" rx="6" fill="#f6ad55"/>
    <text x="650" y="193" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">
      75% confidence
    </text>
    
    <text x="655" y="220" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
      Semantic (0.92) + Temporal (0.85) + Usage (0.90)
    </text>
    
    <!-- Process -->
    <rect x="555" y="235" width="190" height="45" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1"/>
    <text x="560" y="252" font-family="Arial, sans-serif" font-size="11" fill="#744210" font-weight="600">
      For high-traffic queries:
    </text>
    <text x="565" y="267" font-family="Arial, sans-serif" font-size="10" fill="#744210">
      Regenerate and compare drift
    </text>
  </g>
  
  <!-- Best Practice: Hybrid Approach -->
  <g id="hybrid-approach">
    <rect x="30" y="320" width="740" height="200" rx="12" fill="#fff" stroke="#4299e1" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Header -->
    <rect x="30" y="320" width="740" height="50" rx="12" fill="#ebf8ff"/>
    <text x="400" y="352" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282" text-anchor="middle">
      ⭐ Recommended: Hybrid Approach
    </text>
    
    <!-- Hybrid strategy flow -->
    <g transform="translate(60, 390)">
      <!-- Step 1 -->
      <rect x="0" y="0" width="140" height="80" rx="8" fill="#f7fafc" stroke="#cbd5e0" stroke-width="2"/>
      <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" text-anchor="middle" font-weight="600">
        1. Check TTL
      </text>
      <text x="70" y="45" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        Base expiration
      </text>
      <text x="70" y="60" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        (24-72 hours for
      </text>
      <text x="70" y="73" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        most content)
      </text>
      
      <!-- Arrow -->
      <path d="M 140 40 L 170 40" stroke="#4299e1" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="155" y="30" font-family="Arial, sans-serif" font-size="8" fill="#4299e1" text-anchor="middle">
        Valid?
      </text>
      
      <!-- Step 2 -->
      <rect x="170" y="0" width="140" height="80" rx="8" fill="#f7fafc" stroke="#cbd5e0" stroke-width="2"/>
      <text x="240" y="25" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" text-anchor="middle" font-weight="600">
        2. Check Versions
      </text>
      <text x="240" y="45" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        Source docs
      </text>
      <text x="240" y="60" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        changed?
      </text>
      
      <!-- Arrow -->
      <path d="M 310 40 L 340 40" stroke="#4299e1" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="325" y="30" font-family="Arial, sans-serif" font-size="8" fill="#4299e1" text-anchor="middle">
        Valid?
      </text>
      
      <!-- Step 3 -->
      <rect x="340" y="0" width="140" height="80" rx="8" fill="#f7fafc" stroke="#cbd5e0" stroke-width="2"/>
      <text x="410" y="25" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" text-anchor="middle" font-weight="600">
        3. High Traffic?
      </text>
      <text x="410" y="45" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        Popular queries get
      </text>
      <text x="410" y="60" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        background
      </text>
      <text x="410" y="73" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">
        revalidation
      </text>
      
      <!-- Arrow -->
      <path d="M 480 40 L 510 40" stroke="#4299e1" stroke-width="2" marker-end="url(#arrow)"/>
      
      <!-- Result -->
      <rect x="510" y="10" width="140" height="60" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
      <text x="580" y="35" font-family="Arial, sans-serif" font-size="13" fill="#22543d" text-anchor="middle" font-weight="bold">
        ✓ Valid Cache
      </text>
      <text x="580" y="52" font-family="Arial, sans-serif" font-size="10" fill="#2d7748" text-anchor="middle">
        Serve response
      </text>
    </g>
    
    <!-- Benefits box -->
    <rect x="50" y="485" width="700" height="25" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1"/>
    <text x="400" y="502" font-family="Arial, sans-serif" font-size="12" fill="#22543d" text-anchor="middle">
      ✨ Combines multiple strategies for robust freshness without over-invalidation
    </text>
  </g>
</svg>