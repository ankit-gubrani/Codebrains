<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#111">
    Context Engineering
  </text>
  
  <!-- Left side - Poor Context Management -->
  <g>
    <rect x="50" y="80" width="300" height="280" rx="10" fill="white" stroke="#ef4444" stroke-width="3"/>
    <text x="200" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">
      Without Context Engineering
    </text>
    
    <!-- Messy context representation -->
    <circle cx="100" cy="160" r="15" fill="#fca5a5" opacity="0.7"/>
    <circle cx="140" cy="150" r="18" fill="#fca5a5" opacity="0.7"/>
    <circle cx="180" cy="165" r="12" fill="#fca5a5" opacity="0.7"/>
    <circle cx="220" cy="155" r="16" fill="#fca5a5" opacity="0.7"/>
    <circle cx="260" cy="170" r="14" fill="#fca5a5" opacity="0.7"/>
    <circle cx="300" cy="160" r="17" fill="#fca5a5" opacity="0.7"/>
    <circle cx="120" cy="200" r="13" fill="#fca5a5" opacity="0.7"/>
    <circle cx="160" cy="210" r="19" fill="#fca5a5" opacity="0.7"/>
    <circle cx="200" cy="195" r="11" fill="#fca5a5" opacity="0.7"/>
    <circle cx="240" cy="205" r="15" fill="#fca5a5" opacity="0.7"/>
    <circle cx="280" cy="215" r="16" fill="#fca5a5" opacity="0.7"/>
    
    <!-- Problems list -->
    <text x="70" y="260" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">• Context bloat</text>
    <text x="70" y="285" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">• Stale embeddings</text>
    <text x="70" y="310" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">• High costs</text>
    <text x="70" y="335" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">• Poor accuracy</text>
  </g>
  
  <!-- Right side - Good Context Management -->
  <g>
    <rect x="450" y="80" width="300" height="280" rx="10" fill="white" stroke="#10b981" stroke-width="3"/>
    <text x="600" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#059669">
      With Context Engineering
    </text>
    
    <!-- Organized context representation -->
    <rect x="480" y="140" width="240" height="30" rx="5" fill="url(#grad2)" opacity="0.8"/>
    <text x="600" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">System Context (200 tokens)</text>
    
    <rect x="480" y="185" width="240" height="30" rx="5" fill="url(#grad2)" opacity="0.6"/>
    <text x="600" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Session Context (500 tokens)</text>
    
    <rect x="480" y="230" width="240" height="30" rx="5" fill="url(#grad2)" opacity="0.4"/>
    <text x="600" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Query Context (3,000 tokens)</text>
    
    <!-- Benefits list -->
    <text x="470" y="285" font-family="Arial, sans-serif" font-size="13" fill="#065f46">✓ Optimized tokens</text>
    <text x="470" y="310" font-family="Arial, sans-serif" font-size="13" fill="#065f46">✓ Fresh context</text>
    <text x="470" y="335" font-family="Arial, sans-serif" font-size="13" fill="#065f46">✓ Lower costs</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 360 220 L 440 220" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>
  </defs>
</svg>