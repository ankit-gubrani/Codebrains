<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Moltbot Architecture
  </text>
  
  <!-- Phone/User -->
  <g id="phone">
    <rect x="50" y="150" width="120" height="180" rx="15" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
    <rect x="60" y="160" width="100" height="140" rx="5" fill="#ecf0f1"/>
    <circle cx="110" cy="315" r="12" fill="#ecf0f1"/>
    <text x="110" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Telegram/
    </text>
    <text x="110" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      WhatsApp
    </text>
  </g>
  
  <!-- Arrow from Phone to Claudebot -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <line x1="170" y1="200" x2="280" y2="200" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="225" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e74c3c">
    Commands
  </text>
  
  <!-- Arrow from Claudebot to Phone -->
  <line x1="280" y1="280" x2="170" y2="280" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="225" y="300" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#27ae60">
    Responses
  </text>
  
  <!-- Claudebot (Local Machine) -->
  <g id="claudebot">
    <rect x="280" y="120" width="240" height="200" rx="10" fill="#ffffff" stroke="#34495e" stroke-width="3"/>
    <rect x="290" y="130" width="220" height="30" rx="5" fill="#9b59b6"/>
    <text x="400" y="152" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Moltbot
    </text>
    <text x="400" y="185" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#7f8c8d">
      (Local Machine)
    </text>
    
    <!-- Icons for capabilities -->
    <circle cx="320" cy="220" r="20" fill="#3498db" opacity="0.2"/>
    <text x="320" y="228" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#3498db">
      📁
    </text>
    
    <circle cx="400" cy="220" r="20" fill="#e67e22" opacity="0.2"/>
    <text x="400" y="228" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#e67e22">
      🌐
    </text>
    
    <circle cx="480" cy="220" r="20" fill="#27ae60" opacity="0.2"/>
    <text x="480" y="228" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#27ae60">
      ⏰
    </text>
    
    <text x="320" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">
      Files
    </text>
    <text x="400" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">
      Browser
    </text>
    <text x="480" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">
      Cron Jobs
    </text>
    
    <text x="400" y="295" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e" font-weight="bold">
      Direct System Access
    </text>
  </g>
  
  <!-- Arrow from Claudebot to System -->
  <line x1="520" y1="220" x2="600" y2="220" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- System Resources -->
  <g id="system">
    <rect x="600" y="100" width="150" height="240" rx="10" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
    <text x="675" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#34495e">
      Your System
    </text>
    
    <!-- File system -->
    <rect x="615" y="150" width="120" height="40" rx="5" fill="#3498db" opacity="0.7"/>
    <text x="675" y="175" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
      File System
    </text>
    
    <!-- Browser -->
    <rect x="615" y="200" width="120" height="40" rx="5" fill="#e67e22" opacity="0.7"/>
    <text x="675" y="225" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
      Browser
    </text>
    
    <!-- Scheduled Tasks -->
    <rect x="615" y="250" width="120" height="40" rx="5" fill="#27ae60" opacity="0.7"/>
    <text x="675" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
      Scheduled Tasks
    </text>
    
    <!-- Applications -->
    <rect x="615" y="300" width="120" height="30" rx="5" fill="#95a5a6" opacity="0.5"/>
    <text x="675" y="320" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">
      Applications
    </text>
  </g>
  
  <!-- Footer note -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7f8c8d" font-style="italic">
    Bidirectional communication between user and local AI agent with full system access
  </text>
</svg>