<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <!-- Background -->
  <rect width="900" height="300" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Moltbot Command Flow
  </text>
  
  <!-- Step 1: User Message -->
  <g id="step1">
    <rect x="30" y="80" width="180" height="120" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
    <circle cx="120" cy="100" r="8" fill="#ffffff"/>
    <text x="120" y="135" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">
      User Message
    </text>
    <text x="120" y="160" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#ecf0f1">
      (via Phone)
    </text>
    <text x="120" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ffffff" font-style="italic">
      "Check my email"
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495e"/>
    </marker>
  </defs>
  
  <line x1="210" y1="140" x2="280" y2="140" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="245" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">
    sends
  </text>
  
  <!-- Step 2: Claudebot -->
  <g id="step2">
    <rect x="280" y="80" width="200" height="120" rx="10" fill="#9b59b6" stroke="#8e44ad" stroke-width="3"/>
    <circle cx="380" cy="100" r="8" fill="#ffffff"/>
    <text x="380" y="135" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Moltbot
    </text>
    <text x="380" y="160" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#ecf0f1">
      (Local Machine)
    </text>
    <text x="380" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ffffff" font-style="italic">
      Processes and Plans
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="480" y1="140" x2="550" y2="140" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="515" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">
    executes
  </text>
  
  <!-- Step 3: System Actions -->
  <g id="step3">
    <rect x="550" y="60" width="320" height="160" rx="10" fill="#ffffff" stroke="#34495e" stroke-width="3"/>
    <circle cx="710" cy="80" r="8" fill="#34495e"/>
    <text x="710" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#34495e">
      System Actions
    </text>
    
    <!-- Action boxes -->
    <rect x="570" y="130" width="130" height="35" rx="5" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="2"/>
    <text x="635" y="152" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">
      📁 File Operations
    </text>
    
    <rect x="570" y="175" width="130" height="35" rx="5" fill="#e67e22" opacity="0.3" stroke="#e67e22" stroke-width="2"/>
    <text x="635" y="197" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">
      🌐 Browser Tasks
    </text>
    
    <rect x="720" y="130" width="130" height="35" rx="5" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="2"/>
    <text x="785" y="152" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">
      ⏰ Cron Jobs
    </text>
    
    <rect x="720" y="175" width="130" height="35" rx="5" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-width="2"/>
    <text x="785" y="197" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">
      💻 CLI Commands
    </text>
  </g>
  
  <!-- Key Features Box -->
  <g id="features">
    <rect x="30" y="230" width="840" height="50" rx="8" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
    <text x="450" y="252" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Key Difference: Direct system access + Autonomous scheduling + No sandbox restrictions
    </text>
    <text x="450" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7f8c8d" font-style="italic">
      Unlike web-based AI, Moltbot operates with full privileges on your local machine
    </text>
  </g>
</svg>