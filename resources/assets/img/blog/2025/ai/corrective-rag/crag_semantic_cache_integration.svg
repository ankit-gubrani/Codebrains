<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cacheGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#845ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5f3dc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cragGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    CRAG + Semantic Cache: The Perfect Complement
  </text>
  
  <!-- Query Input -->
  <g transform="translate(350, 70)">
    <rect x="0" y="0" width="100" height="45" rx="5" fill="#495057" opacity="0.9"/>
    <text x="50" y="28" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">
      Query
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 400 115 L 400 145" stroke="#495057" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  
  <!-- Stage 1: Semantic Cache Check -->
  <g transform="translate(250, 145)">
    <rect x="0" y="0" width="300" height="80" rx="8" fill="url(#cacheGrad)" opacity="0.9"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">
      Stage 1: Semantic Cache
    </text>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Check for semantically similar queries
    </text>
    <text x="150" y="62" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Threshold: 0.90 similarity
    </text>
  </g>
  <path d="M 400 225 L 400 235" stroke="#495057" stroke-width="1.5" fill="none" marker-end="none"/>
  <!-- Decision: Cache Hit? -->
  <g transform="translate(400, 260)">
    <polygon points="0,-25 35,0 0,25 -35,0" fill="#845ef7" opacity="0.9" stroke="#5f3dc4" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">
      Hit?
    </text>
  </g>
  
  <!-- Cache Hit Path (Right) -->
  <g transform="translate(540, 260)">
    <path d="M -105 0 L 70 0" stroke="#51cf66" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="-40" y="20" font-family="Arial, sans-serif" font-size="11" fill="#37b24d" font-weight="bold">
      Yes ✓
    </text>
    
    <rect x="70" y="-30" width="180" height="80" rx="5" fill="#51cf66" opacity="0.9"/>
    <text x="160" y="-5" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">
      Return Cached
    </text>
    <text x="160" y="15" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Instant response
    </text>
    <text x="160" y="32" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Skip CRAG entirely
    </text>
    
    <!-- Speed indicator -->
    <text x="160" y="70" font-family="Arial, sans-serif" font-size="10" fill="#ffd43b" text-anchor="middle" font-weight="bold">
      ⚡ ~200ms
    </text>
  </g>
  
  <!-- Cache Miss Path (Down) -->
  <g transform="translate(400, 285)">
    <path d="M 0 0 L 0 35" stroke="#ff922b" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
    <text x="-35" y="15" font-family="Arial, sans-serif" font-size="11" fill="#e67700" font-weight="bold">
      No ✗
    </text>
  </g>
  
  <!-- Stage 2: CRAG Pipeline -->
  <g transform="translate(200, 320)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="url(#cragGrad)" opacity="0.9"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">
      Stage 2: Full CRAG Pipeline
    </text>
    
    <g transform="translate(20, 40)">
      <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="white">
        1. Retrieve documents from vector DB
      </text>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="11" fill="white">
        2. Evaluate retrieval quality (confidence scoring)
      </text>
      <text x="0" y="48" font-family="Arial, sans-serif" font-size="11" fill="white">
        3. Apply corrections if needed (filter/search/reformulate)
      </text>
      <text x="0" y="66" font-family="Arial, sans-serif" font-size="11" fill="white">
        4. Generate response with LLM
      </text>
      
      <text x="180" y="95" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">
        ⏱️ ~2-4 seconds (depending on corrections)
      </text>
    </g>
  </g>
  
  <!-- Arrow down to caching decision -->
  <path d="M 400 460 L 400 490" stroke="#667eea" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  
  <!-- Stage 3: Cache Decision -->
  <g transform="translate(250, 490)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="#ffd43b" opacity="0.95" stroke="#fab005" stroke-width="1.5"/>
    <text x="150" y="22" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">
      Stage 3: Cache the Response?
    </text>
    <text x="150" y="40" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">
      ✓ Cache if confidence &gt; 0.85
    </text>
    <text x="150" y="55" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">
      ✗ Don't cache if moderate/low confidence
    </text>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(50, 570)">
    <rect x="0" y="0" width="700" height="20" rx="3" fill="#e7f5ff"/>
    <text x="350" y="14" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" text-anchor="middle" font-weight="bold">
      💡 Cache optimizes for speed (60-80% queries), CRAG optimizes for accuracy (when cache misses)
    </text>
  </g>
  
  <!-- Benefits Callout -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="180" height="90" rx="5" fill="#e7f5ff" stroke="#4dabf7" stroke-width="1.5"/>
    <text x="90" y="18" font-family="Arial, sans-serif" font-size="11" fill="#1971c2" text-anchor="middle" font-weight="bold">
      Benefits of Integration:
    </text>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="9" fill="#495057">
      • 60-80% queries skip CRAG
    </text>
    <text x="10" y="50" font-family="Arial, sans-serif" font-size="9" fill="#495057">
      • Only cache high-quality
    </text>
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="9" fill="#495057">
      • Best of both: speed + accuracy
    </text>
    <text x="10" y="80" font-family="Arial, sans-serif" font-size="9" fill="#495057">
      • Dramatic cost reduction
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#495057" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#51cf66" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff922b" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea" />
    </marker>
  </defs>
</svg>