<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#37b24d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    Traditional RAG vs Corrective RAG
  </text>
  
  <!-- Traditional RAG Section -->
  <g transform="translate(50, 80)">
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
      Traditional RAG
    </text>
    
    <!-- Query -->
    <rect x="0" y="20" width="100" height="50" rx="5" fill="#667eea" opacity="0.8"/>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Query</text>
    
    <!-- Arrow -->
    <path d="M 100 45 L 140 45" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
    
    <!-- Retrieval -->
    <rect x="140" y="20" width="100" height="50" rx="5" fill="#667eea" opacity="0.8"/>
    <text x="190" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Retrieval</text>
    
    <!-- Arrow -->
    <path d="M 240 45 L 280 45" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
    
    <!-- Generation -->
    <rect x="280" y="20" width="100" height="50" rx="5" fill="#667eea" opacity="0.8"/>
    <text x="330" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Generation</text>
    
    <!-- Arrow -->
    <path d="M 380 45 L 420 45" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
    
    <!-- Response -->
    <rect x="420" y="20" width="100" height="50" rx="5" fill="#667eea" opacity="0.8"/>
    <text x="470" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Response</text>
    
    <!-- Problem indicator -->
    <text x="250" y="100" font-family="Arial, sans-serif" font-size="13" fill="#e03131" text-anchor="middle">
      ❌ No quality validation
    </text>
  </g>
  
  <!-- CRAG Section -->
  <g transform="translate(50, 260)">
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37b24d">
      Corrective RAG (CRAG)
    </text>
    
    <!-- Query -->
    <rect x="0" y="20" width="100" height="50" rx="5" fill="#51cf66" opacity="0.8"/>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Query</text>
    
    <!-- Arrow -->
    <path d="M 100 45 L 140 45" stroke="#51cf66" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    
    <!-- Retrieval -->
    <rect x="140" y="20" width="100" height="50" rx="5" fill="#51cf66" opacity="0.8"/>
    <text x="190" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Retrieval</text>
    
    <!-- Arrow -->
    <path d="M 240 45 L 280 45" stroke="#51cf66" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    
    <!-- Evaluation (highlighted) -->
    <rect x="280" y="15" width="100" height="60" rx="5" fill="#ffd43b" opacity="0.9" stroke="#fab005" stroke-width="3"/>
    <text x="330" y="42" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="bold">✓ Evaluate</text>
    <text x="330" y="60" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Quality Check</text>
    
    <!-- Conditional arrow down to correction -->
    <path d="M 330 75 L 330 110" stroke="#fab005" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrow3)"/>
    <text x="345" y="95" font-family="Arial, sans-serif" font-size="10" fill="#e67700">If Low Quality</text>
    
    <!-- Correction box -->
    <rect x="250" y="110" width="160" height="45" rx="5" fill="#ff8787" opacity="0.8"/>
    <text x="330" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">🔄 Correction</text>
    <text x="330" y="150" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Filter / Search / Reformulate</text>
    
    <!-- Arrow back up -->
    <path d="M 250 132 L 225 132 L 225 45 L 240 45" stroke="#ff8787" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
    
    <!-- Arrow from evaluation to generation -->
    <path d="M 380 45 L 450 45" stroke="#51cf66" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    
    <!-- Generation -->
    <rect x="450" y="20" width="100" height="50" rx="5" fill="#51cf66" opacity="0.8"/>
    <text x="500" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Generation</text>
    
    <!-- Arrow -->
    <path d="M 550 45 L 590 45" stroke="#51cf66" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    
    <!-- Response -->
    <rect x="590" y="20" width="100" height="50" rx="5" fill="#51cf66" opacity="0.8"/>
    <text x="640" y="50" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Response</text>
    
    <!-- Benefit indicator -->
    <text x="345" y="180" font-family="Arial, sans-serif" font-size="13" fill="#37b24d" text-anchor="middle">
      ✓ Quality validation and automatic correction
    </text>
  </g>
  
  <!-- Key Difference Callout -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="700" height="30" rx="5" fill="#e7f5ff" stroke="#4dabf7" stroke-width="2"/>
    <text x="350" y="20" font-family="Arial, sans-serif" font-size="13" fill="#1971c2" text-anchor="middle" font-weight="bold">
      🔑 Key Difference: CRAG validates retrieval quality and corrects before generating responses
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#51cf66" />
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#fab005" />
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="3" refY="3" orient="auto">
      <polygon points="0 0, 5 3, 0 6" fill="#ff8787" />
    </marker>
  </defs>
</svg>