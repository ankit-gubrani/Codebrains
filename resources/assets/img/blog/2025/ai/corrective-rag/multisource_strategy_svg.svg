<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#37b24d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    Multi-Source Retrieval Strategy Decision Flow
  </text>
  
  <!-- Query Input -->
  <g transform="translate(400, 70)">
    <rect x="0" y="0" width="100" height="45" rx="5" fill="#495057" opacity="0.9"/>
    <text x="50" y="28" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">
      Query
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 450 115 L 450 145" stroke="#495057" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  
  <!-- Step 1: Primary Source -->
  <g transform="translate(300, 145)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="url(#primaryGrad)" opacity="0.9"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">
      Step 1: Primary Source (Internal KB)
    </text>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Retrieve from internal knowledge base
    </text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Evaluate confidence score
    </text>
  </g>
  
  <!-- Arrow down to decision -->
  <path d="M 450 215 L 450 250" stroke="#667eea" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>
  
  <!-- Decision Diamond -->
  <g transform="translate(450, 275)">
    <polygon points="0,-25 70,0 0,25 -70,0" fill="#4dabf7" opacity="0.95" stroke="#1971c2" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">
      Confidence score?
    </text>
  </g>
  
  <!-- Path 1: High Confidence (Right) -->
  <g transform="translate(550, 265)">
    <path d="M -30 10 L 80 10" stroke="#51cf66" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#37b24d" font-weight="bold">
      High (&gt;0.85)
    </text>
    
    <rect x="80" y="-25" width="200" height="70" rx="5" fill="#51cf66" opacity="0.9"/>
    <text x="180" y="-5" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">
      Use Internal Only
    </text>
    <text x="180" y="15" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      KB has high-quality answer
    </text>
    <text x="180" y="32" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      No external search needed
    </text>
  </g>
  
  <path d="M 450 300 L 450 340" stroke="#ff922b" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="460" y="320" font-family="Arial, sans-serif" font-size="11" fill="#e67700" font-weight="bold">
      Med (0.65-0.85)
    </text>
  <!-- Path 2: Medium Confidence (Bottom Right) -->
  <g transform="translate(320, 280)">
    <rect x="40" y="60" width="200" height="85" rx="5" fill="#ff922b" opacity="0.9"/>
    <text x="140" y="80" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">
      Combine Both Sources
    </text>
    <text x="140" y="100" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      Filter internal docs
    </text>
    <text x="140" y="115" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      + Supplement with web
    </text>
    <text x="140" y="133" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      Merge and rank by confidence
    </text>
  </g>
  
  <!-- Path 3: Low Confidence (Left) -->
  <g transform="translate(350, 265)">
    <path d="M 30 10 L -80 10" stroke="#ff6b6b" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
    <text x="-40" y="0" font-family="Arial, sans-serif" font-size="11" fill="#e03131" font-weight="bold">
      Low (&lt;0.65)
    </text>
    
    <rect x="-270" y="-30" width="190" height="80" rx="5" fill="#ff6b6b" opacity="0.9"/>
    <text x="-175" y="-10" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">
      Prioritize Web
    </text>
    <text x="-175" y="10" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      KB lacks good info
    </text>
    <text x="-175" y="27" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      Web has better sources
    </text>
    <text x="-175" y="42" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">
      (+ top 2 internal docs)
    </text>
  </g>
  
  <!-- Step 2: Secondary Source (Web) -->
  <g transform="translate(10, 360)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#secondaryGrad)" opacity="0.9"/>
    <text x="150" y="22" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">
      Step 2: Secondary Source (Web Search)
    </text>
    <text x="150" y="40" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Triggered for Medium &amp; Low confidence scenarios
    </text>
    <text x="150" y="53" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.8">
      (Tavily, Bing, or Google Search API)
    </text>
  </g>
  
  <!-- Arrows to web search -->
  <path d="M 180 300 L 180 360" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <path d="M 370 390 L 310 390" stroke="#ff922b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  
  <path d="M 180 420 L 180 465 L 360 465" stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <path d="M 730 310 L 730 465 L 560 465" stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>

  <g transform="translate(360, 450)">
    <rect x="0" y="0" width="200" height="30" rx="5" fill="#ffd43b" opacity="0.9"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="15" fill="black" text-anchor="middle" font-weight="bold">
      LLM
    </text>
  </g>

  <!-- Bottom insight box -->
  <g transform="translate(50, 510)">
    <rect x="0" y="0" width="800" height="35" rx="5" fill="#e7f5ff" stroke="#4dabf7" stroke-width="2"/>
    <text x="400" y="22" font-family="Arial, sans-serif" font-size="12" fill="#1971c2" text-anchor="middle" font-weight="bold">
      💡 Strategy: Fast private responses when possible, comprehensive fresh responses when necessary
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#495057" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#51cf66" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff922b" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
    </marker>
  </defs>
</svg>