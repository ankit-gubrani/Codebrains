<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#111">
    Context Engineering vs Prompt Engineering
  </text>
  
  <!-- Prompt Engineering Section -->
  <g>
    <rect x="50" y="80" width="330" height="380" rx="10" fill="white" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="50" y="80" width="330" height="50" rx="10" fill="url(#promptGrad)"/>
    <text x="215" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
      Prompt Engineering
    </text>
    
    <text x="70" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed">
      The Instruction Layer
    </text>
    <text x="70" y="185" font-family="Arial, sans-serif" font-size="13" fill="#4b5563" font-style="italic">
      "What you tell the model to do"
    </text>
    
    <!-- Focus areas -->
    <text x="70" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Focuses on:</text>
    <text x="90" y="245" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Behavior and tone</text>
    <text x="90" y="270" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Output format</text>
    <text x="90" y="295" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Reasoning approach</text>
    <text x="90" y="320" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Task decomposition</text>
    
    <!-- Example -->
    <rect x="70" y="340" width="290" height="100" rx="5" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="80" y="360" font-family="Courier New, monospace" font-size="11" fill="#6b21a8">You are a helpful assistant.</text>
    <text x="80" y="378" font-family="Courier New, monospace" font-size="11" fill="#6b21a8">Be concise and friendly.</text>
    <text x="80" y="396" font-family="Courier New, monospace" font-size="11" fill="#6b21a8">Provide step-by-step</text>
    <text x="80" y="414" font-family="Courier New, monospace" font-size="11" fill="#6b21a8">instructions.</text>
  </g>
  
  <!-- Context Engineering Section -->
  <g>
    <rect x="420" y="80" width="330" height="380" rx="10" fill="white" stroke="#3b82f6" stroke-width="3"/>
    <rect x="420" y="80" width="330" height="50" rx="10" fill="url(#contextGrad)"/>
    <text x="585" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
      Context Engineering
    </text>
    
    <text x="440" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">
      The Information Layer
    </text>
    <text x="440" y="185" font-family="Arial, sans-serif" font-size="13" fill="#4b5563" font-style="italic">
      "What you give the model to work with"
    </text>
    
    <!-- Focus areas -->
    <text x="440" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Focuses on:</text>
    <text x="460" y="245" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• What information to include</text>
    <text x="460" y="270" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• How to structure it</text>
    <text x="460" y="295" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Keeping it fresh</text>
    <text x="460" y="320" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• When to load it</text>
    
    <!-- Example -->
    <rect x="440" y="340" width="290" height="100" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="450" y="360" font-family="Courier New, monospace" font-size="11" fill="#1e40af">[Retrieved Docs]</text>
    <text x="450" y="378" font-family="Courier New, monospace" font-size="11" fill="#1e40af">[User History]</text>
    <text x="450" y="396" font-family="Courier New, monospace" font-size="11" fill="#1e40af">[Account Info]</text>
    <text x="450" y="414" font-family="Courier New, monospace" font-size="11" fill="#1e40af">[Product Metadata]</text>
  </g>
  
  <!-- Bottom comparison -->
  <rect x="50" y="480" width="330" height="1" fill="#8b5cf6"/>
  <text x="215" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">
    How to think
  </text>
  
  <rect x="420" y="480" width="330" height="1" fill="#3b82f6"/>
  <text x="585" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">
    What to think about
  </text>
</svg>