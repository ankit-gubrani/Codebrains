<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="800" height="400" fill="#f8f9fa"/>

    <!-- Title -->
    <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#1a1a1a">
        Semantic Similarity Through Vector Embeddings
    </text>

    <!-- Left side - Text examples -->
    <g id="text-examples">
        <!-- Text 1 -->
        <rect x="50" y="80" width="280" height="80" fill="#ffffff" stroke="#007bff" stroke-width="2" rx="8"/>
        <text x="190" y="110" text-anchor="middle" font-size="14" fill="#333" font-weight="500">
            "How do I reset my password?"
        </text>
        <text x="190" y="140" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
            User Query
        </text>

        <!-- Text 2 -->
        <rect x="50" y="200" width="280" height="80" fill="#ffffff" stroke="#28a745" stroke-width="2" rx="8"/>
        <text x="190" y="230" text-anchor="middle" font-size="14" fill="#333" font-weight="500">
            "Account Recovery Procedures"
        </text>
        <text x="190" y="260" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
            Knowledge Base Article
        </text>
    </g>

    <!-- Arrows pointing to embedding model -->
    <path d="M 330 120 L 380 180" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
    <path d="M 330 240 L 380 220" stroke="#28a745" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

    <!-- Embedding Model box -->
    <rect x="380" y="170" width="120" height="60" fill="#6c757d" rx="8"/>
    <text x="440" y="195" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">
        Embedding
    </text>
    <text x="440" y="215" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">
        Model
    </text>

    <!-- Arrows to vectors -->
    <path d="M 500 185 L 540 165" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
    <path d="M 500 215 L 540 200" stroke="#28a745" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>

    <!-- Right side - Vectors in space -->
    <g id="vector-space">
        <!-- Vector space background -->
        <rect x="540" y="60" width="220" height="260" fill="#ffffff" stroke="#dee2e6" stroke-width="2" rx="8"/>
        <text x="650" y="85" text-anchor="middle" font-size="12" fill="#666" font-weight="500">
            High-Dimensional Vector Space
        </text>

        <!-- Grid lines -->
        <line x1="560" y1="200" x2="740" y2="200" stroke="#e9ecef" stroke-width="1"/>
        <line x1="650" y1="100" x2="650" y2="300" stroke="#e9ecef" stroke-width="1"/>

        <!-- Vector 1 point -->
        <circle cx="620" cy="140" r="12" fill="#007bff" opacity="0.8"/>
        <text x="620" y="145" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">V1</text>
        <text x="620" y="165" text-anchor="middle" font-size="9" fill="#007bff" font-weight="500">
            [0.23, -0.45, 0.67,...]
        </text>

        <!-- Vector 2 point -->
        <circle cx="640" cy="160" r="12" fill="#28a745" opacity="0.8"/>
        <text x="640" y="165" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">V2</text>
        <text x="640" y="185" text-anchor="middle" font-size="9" fill="#28a745" font-weight="500">
            [0.21, -0.43, 0.69,...]
        </text>

        <!-- Distance line between vectors -->
        <line x1="620" y1="140" x2="640" y2="160" stroke="red" stroke-width="2" stroke-dasharray="3,3"/>
        <text x="650" y="145" text-anchor="middle" font-size="10" fill="red" font-weight="800">
            Close!
        </text>

        <!-- Distant vector (unrelated) -->
        <circle cx="700" cy="270" r="12" fill="#dc3545" opacity="0.8"/>
        <text x="700" y="275" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">V3</text>
        <text x="700" y="295" text-anchor="middle" font-size="9" fill="#dc3545" font-weight="500">
            [0.89, 0.12, -0.34,...]
        </text>
        <text x="700" y="310" text-anchor="middle" font-size="9" fill="#666" font-style="italic">
            (Unrelated concept)
        </text>
    </g>

    <!-- Key insight box -->
    <rect x="50" y="330" width="700" height="50" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="8"/>
    <text x="400" y="355" text-anchor="middle" font-size="14" fill="#856404" font-weight="600">
        💡 Semantically similar text → Similar vectors → Fast retrieval based on meaning, not keywords
    </text>

    <!-- Arrow markers -->
    <defs>
        <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#007bff" />
        </marker>
        <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
        </marker>
    </defs>
</svg>